services:
  postgres:
    image: joaovictorgi/postgres-search:0.0.2
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pontual}
      POSTGRES_USER: ${POSTGRES_USER:-pontual}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pontual}
    command: postgres -c shared_preload_libraries=pg_textsearch
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pontual" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
